<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HuggingFace → Ollama</title>
<style>
  :root{
    --bg:#0f1419; --panel:#1a212b; --panel2:#222b36; --border:#2d3744;
    --text:#e6edf3; --muted:#8b98a5; --accent:#3b82f6; --accent2:#2563eb;
    --ok:#22c55e; --err:#ef4444; --warn:#f59e0b;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:system-ui,-apple-system,"Segoe UI","Noto Sans TC","Noto Sans JP","Noto Sans KR",sans-serif;
       background:var(--bg);color:var(--text);font-size:14px}
  header{padding:16px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
  header h1{font-size:18px;margin:0;font-weight:600}
  header .badge{font-size:12px;color:var(--muted)}
  .wrap{max-width:1100px;margin:0 auto;padding:20px;display:flex;flex-direction:column;gap:20px}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:18px}
  .card h2{margin:0 0 14px;font-size:15px;font-weight:600;display:flex;align-items:center;gap:8px}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  label{display:block;font-size:12px;color:var(--muted);margin-bottom:4px}
  input[type=text],input[type=password],select,textarea{
    width:100%;background:var(--panel2);border:1px solid var(--border);border-radius:6px;
    color:var(--text);padding:8px 10px;font-size:13px;font-family:inherit}
  textarea{resize:vertical;min-height:60px;font-family:ui-monospace,monospace}
  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  button{background:var(--accent);color:#fff;border:none;border-radius:6px;padding:8px 14px;
         font-size:13px;cursor:pointer;font-weight:500}
  button:hover{background:var(--accent2)}
  button.secondary{background:var(--panel2);border:1px solid var(--border)}
  button.secondary:hover{background:#2d3744}
  button:disabled{opacity:.5;cursor:not-allowed}
  .hint{font-size:12px;color:var(--muted);margin-top:6px}
  .mode-rows>div{display:none}
  .pill{display:inline-block;padding:2px 8px;border-radius:999px;font-size:11px}
  .pill.ok{background:rgba(34,197,94,.15);color:var(--ok)}
  .pill.err{background:rgba(239,68,68,.15);color:var(--err)}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{text-align:left;padding:7px 10px;border-bottom:1px solid var(--border)}
  th{color:var(--muted);font-weight:500;font-size:12px}
  tbody tr:hover{background:var(--panel2)}
  .filelist{max-height:240px;overflow:auto;border:1px solid var(--border);border-radius:6px}
  .filerow{display:flex;align-items:center;gap:8px;padding:6px 10px;border-bottom:1px solid var(--border)}
  .filerow:last-child{border-bottom:none}
  .filerow code{font-family:ui-monospace,monospace;font-size:12px}
  .filerow .sz{margin-left:auto;color:var(--muted);font-size:12px}
  .tag{font-size:10px;padding:1px 6px;border-radius:4px;background:rgba(59,130,246,.2);color:#93c5fd}
  .progress{height:8px;background:var(--panel2);border-radius:999px;overflow:hidden;margin:8px 0}
  .progress>div{height:100%;background:var(--accent);width:0;transition:width .2s}
  pre.log{background:#0b0e13;border:1px solid var(--border);border-radius:6px;padding:10px;
          font-size:12px;max-height:300px;overflow:auto;white-space:pre-wrap;margin:0;
          font-family:ui-monospace,monospace}
  .muted{color:var(--muted)}
  .statusline{font-size:12px;margin-top:6px}
  .empty{color:var(--muted);padding:10px;text-align:center}
  #lang{margin-left:auto;width:auto;font-size:13px;padding:5px 8px}
  .spin{display:inline-block;width:12px;height:12px;border:2px solid var(--border);
        border-top-color:var(--accent);border-radius:50%;animation:s .7s linear infinite}
  @keyframes s{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<header>
  <h1 data-i18n="app.title">🦙 HuggingFace → Ollama</h1>
  <span class="badge" id="connBadge"></span>
  <select id="lang" onchange="setLang(this.value)" title="Language">
    <option value="zh-Hant">繁體中文</option>
    <option value="en">English</option>
    <option value="ja">日本語</option>
    <option value="ko">한국어</option>
    <option value="zh-Hans">简体中文</option>
  </select>
</header>
<div class="wrap">

  <!-- ============ Settings ============ -->
  <div class="card">
    <h2 data-i18n="settings.heading">Ollama 設定</h2>
    <div class="grid">
      <div>
        <label data-i18n="settings.dataDir.label">Ollama 資料目錄</label>
        <input type="text" id="ollama_data_dir" placeholder="/mnt/ollama">
        <div class="hint" data-i18n="settings.dataDir.hint"></div>
      </div>
      <div>
        <label data-i18n="settings.runMode.label">執行模式</label>
        <select id="run_mode" onchange="updateModeUI()">
          <option value="api" data-i18n="settings.runMode.api">HTTP API</option>
          <option value="binary" data-i18n="settings.runMode.binary">binary</option>
          <option value="docker" data-i18n="settings.runMode.docker">Docker</option>
        </select>
        <div class="hint" data-i18n="settings.runMode.hint"></div>
      </div>
    </div>
    <div class="mode-rows" style="margin-top:12px">
      <div data-mode="api">
        <label data-i18n="settings.apiHost.label">Ollama API</label>
        <input type="text" id="ollama_host" placeholder="http://127.0.0.1:11434">
        <div class="hint" data-i18n="settings.apiHost.hint"></div>
      </div>
      <div data-mode="binary">
        <label data-i18n="settings.binaryPath.label">binary</label>
        <input type="text" id="binary_path" data-i18n-ph="settings.binaryPath.ph">
      </div>
      <div data-mode="docker">
        <div class="grid">
          <div>
            <label data-i18n="settings.dockerContainer.label">Docker container</label>
            <input type="text" id="docker_container" placeholder="ollama">
          </div>
          <div>
            <label data-i18n="settings.dockerCommand.label">Docker command</label>
            <input type="text" id="docker_command" data-i18n-ph="settings.dockerCommand.ph">
            <div class="hint" data-i18n="settings.dockerCommand.hint"></div>
          </div>
        </div>
      </div>
    </div>
    <div class="grid" style="margin-top:12px">
      <div>
        <label data-i18n="settings.hfToken.label">HuggingFace Token</label>
        <input type="password" id="hf_token" data-i18n-ph="settings.hfToken.ph">
      </div>
      <div>
        <label data-i18n="settings.downloadDir.label">Download dir</label>
        <input type="text" id="download_dir">
      </div>
    </div>
    <div style="margin-top:12px">
      <label style="display:flex;align-items:center;gap:8px;cursor:pointer;color:var(--text)">
        <input type="checkbox" id="auto_cleanup" style="width:auto;margin:0">
        <span data-i18n="settings.autoCleanup.label">Auto-delete staging after import</span>
      </label>
      <div class="hint" data-i18n="settings.autoCleanup.hint"></div>
    </div>
    <div class="row" style="margin-top:14px">
      <button onclick="saveSettings()" data-i18n="settings.save">Save</button>
      <button class="secondary" onclick="testConnection()" data-i18n="settings.test">Test</button>
      <span id="connStatus" class="statusline"></span>
    </div>
  </div>

  <!-- ============ Download staging ============ -->
  <div class="card">
    <h2>
      <span data-i18n="staging.heading">🧹 Download staging</span>
      <button class="secondary" style="margin-left:auto;font-size:12px;padding:4px 10px" onclick="refreshStaging()" data-i18n="staging.refresh">Refresh</button>
    </h2>
    <div class="row" style="margin-bottom:10px">
      <span id="stagingTotal" class="statusline muted">—</span>
      <button class="secondary" style="margin-left:auto" onclick="clearStaging()" id="clearStagingBtn" data-i18n="staging.clear">Delete all staging</button>
    </div>
    <div id="stagingTable"></div>
    <div id="stagingStatus" class="statusline"></div>
  </div>

  <!-- ============ Ollama status ============ -->
  <div class="card">
    <h2>
      <span data-i18n="status.heading">Ollama 狀態</span>
      <button class="secondary" style="margin-left:auto;font-size:12px;padding:4px 10px" onclick="refreshStatus()" data-i18n="status.refresh">Refresh</button>
    </h2>
    <h3 style="font-size:13px;margin:4px 0 8px;color:var(--muted)" data-i18n="status.running">執行中 (ollama ps)</h3>
    <div id="psTable"><div class="empty">—</div></div>
    <h3 style="font-size:13px;margin:18px 0 8px;color:var(--muted)" data-i18n="status.installed">已安裝 (ollama list)</h3>
    <div id="listTable"><div class="empty">—</div></div>
  </div>

  <!-- ============ Import ============ -->
  <div class="card">
    <h2 data-i18n="import.heading">從 HuggingFace 匯入</h2>
    <div class="grid">
      <div>
        <label data-i18n="import.repoId.label">HuggingFace Repo ID</label>
        <input type="text" id="repo_id" data-i18n-ph="import.repoId.ph">
      </div>
      <div>
        <label data-i18n="import.revision.label">Revision</label>
        <input type="text" id="revision" value="main">
      </div>
    </div>
    <div class="row" style="margin-top:10px">
      <button class="secondary" onclick="listFiles()" data-i18n="import.listFiles">List files</button>
      <span id="filesStatus" class="statusline"></span>
    </div>

    <div id="filesWrap" style="display:none;margin-top:12px">
      <div class="row" style="margin-bottom:8px">
        <label style="margin:0" data-i18n="import.selectLabel">Select files</label>
        <button class="secondary" style="font-size:11px;padding:3px 8px" onclick="selectByType('gguf')" data-i18n="import.selectGguf">All GGUF</button>
        <button class="secondary" style="font-size:11px;padding:3px 8px" onclick="selectByType('safetensors')" data-i18n="import.selectSafetensors">All Safetensors</button>
        <button class="secondary" style="font-size:11px;padding:3px 8px" onclick="selectByType('none')" data-i18n="import.selectNone">Clear</button>
      </div>
      <div class="filelist" id="fileList"></div>

      <div class="grid" style="margin-top:14px">
        <div>
          <label data-i18n="import.fmt.label">Format</label>
          <select id="fmt">
            <option value="gguf" data-i18n="import.fmt.gguf">GGUF</option>
            <option value="safetensors" data-i18n="import.fmt.safetensors">Safetensors</option>
          </select>
        </div>
        <div>
          <label data-i18n="import.modelName.label">Ollama model name</label>
          <input type="text" id="model_name" data-i18n-ph="import.modelName.ph">
        </div>
      </div>
      <div style="margin-top:10px">
        <label data-i18n="import.extra.label">Extra Modelfile</label>
        <textarea id="extra_modelfile" placeholder='PARAMETER temperature 0.7&#10;SYSTEM "You are helpful."'></textarea>
      </div>
      <div class="row" style="margin-top:14px">
        <button onclick="startImport()" data-i18n="import.start">Download & import</button>
        <span id="importStatus" class="statusline"></span>
      </div>
    </div>
  </div>

  <!-- ============ Jobs ============ -->
  <div class="card" id="jobsCard" style="display:none">
    <h2 data-i18n="jobs.heading">工作進度</h2>
    <div id="jobsWrap"></div>
  </div>

</div>

function detectLang(){
  const saved=localStorage.getItem('h2o_lang');
  if(saved && I18N[saved]) return saved;
  const n=(navigator.language||'en').toLowerCase();
  if(n.startsWith('zh')) return (n.includes('cn')||n.includes('hans')||n.includes('sg'))?'zh-Hans':'zh-Hant';
  if(n.startsWith('ja')) return 'ja';
  if(n.startsWith('ko')) return 'ko';
  if(n.startsWith('en')) return 'en';
  return 'zh-Hant';
}
let curLang = detectLang();
function t(key, ...args){
  const dict = I18N[curLang] || I18N['en'];
  let s = (dict[key] !== undefined) ? dict[key]
        : (I18N['en'][key] !== undefined ? I18N['en'][key] : key);
  args.forEach((a,i)=>{ s = s.replace('{'+i+'}', a); });
  return s;
}
function applyI18n(){
  document.documentElement.lang = curLang;
  document.title = t('doc.title');
  document.querySelectorAll('[data-i18n]').forEach(el=>{ el.textContent = t(el.getAttribute('data-i18n')); });
  document.querySelectorAll('[data-i18n-ph]').forEach(el=>{ el.placeholder = t(el.getAttribute('data-i18n-ph')); });
  // hf token placeholder depends on whether a token is already stored
  $('hf_token').placeholder = hfTokenSet ? t('settings.hfToken.phSet') : t('settings.hfToken.ph');
  renderConnBadge();
  renderJobs();
}
function setLang(l){
  if(!I18N[l]) return;
  curLang = l;
  localStorage.setItem('h2o_lang', l);
  applyI18n();
  if(connInfo && connInfo.ok) refreshStatus();  // re-render tables in the new language
}

// ==================== app ====================
const $ = id => document.getElementById(id);
async function jget(u){const r=await fetch(u);if(!r.ok)throw new Error((await r.json().catch(()=>({detail:r.statusText}))).detail||r.statusText);return r.json();}
async function jpost(u,b){const r=await fetch(u,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(b)});const d=await r.json().catch(()=>({}));if(!r.ok)throw new Error(d.detail||r.statusText);return d;}
function human(n){n=+n||0;const u=['B','KB','MB','GB','TB'];let i=0;while(n>=1024&&i<u.length-1){n/=1024;i++;}return n.toFixed(1)+' '+u[i];}
function esc(s){return (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}

let hfTokenSet=false;
let connInfo=null;     // {ok, mode}
let lastJobs=[];

function renderConnBadge(){
  const b=$('connBadge');
  if(connInfo && connInfo.ok){ b.textContent=t('badge.connectedWith', connInfo.mode); }
  else { b.textContent=t('badge.disconnected'); }
}

function updateModeUI(){
  const m=$('run_mode').value;
  document.querySelectorAll('.mode-rows>div').forEach(d=>{d.style.display=d.dataset.mode===m?'block':'none';});
}

async function loadSettings(){
  const s=await jget('/api/settings');
  $('ollama_data_dir').value=s.ollama_data_dir||'';
  $('run_mode').value=s.run_mode||'api';
  $('ollama_host').value=s.ollama_host||'';
  $('binary_path').value=s.binary_path||'';
  $('docker_container').value=s.docker_container||'';
  $('docker_command').value=s.docker_command||'';
  $('download_dir').value=s.download_dir||'';
  $('auto_cleanup').checked=!!s.auto_cleanup;
  hfTokenSet=!!s.hf_token_set;
  $('hf_token').placeholder = hfTokenSet ? t('settings.hfToken.phSet') : t('settings.hfToken.ph');
  updateModeUI();
}

function formBody(){
  const body={
    ollama_data_dir:$('ollama_data_dir').value.trim(),
    run_mode:$('run_mode').value,
    ollama_host:$('ollama_host').value.trim(),
    binary_path:$('binary_path').value.trim(),
    docker_container:$('docker_container').value.trim(),
    docker_command:$('docker_command').value.trim(),
    download_dir:$('download_dir').value.trim(),
    auto_cleanup:$('auto_cleanup').checked,
  };
  const tok=$('hf_token').value;if(tok)body.hf_token=tok;
  return body;
}
async function persistForm(){await jpost('/api/settings',formBody());$('hf_token').value='';}

async function saveSettings(){
  try{await persistForm();$('connStatus').innerHTML='<span class="pill ok">'+t('msg.saved')+'</span>';testConnection();}
  catch(e){$('connStatus').innerHTML='<span class="pill err">'+esc(e.message)+'</span>';}
}

async function testConnection(){
  $('connStatus').innerHTML='<span class="spin"></span> '+t('msg.testing');
  try{
    await persistForm();  // test what's currently in the form, not the old saved value
    const r=await jget('/api/test-connection');
    let h='';
    h+=r.ollama_ok?'<span class="pill ok">'+t('msg.ollamaOk')+'</span> '+esc(r.ollama_version)
                  :'<span class="pill err">'+t('msg.ollamaFail')+'</span> '+esc(r.ollama_error);
    h+=' &nbsp; ';
    h+=r.data_dir_ok?'<span class="pill ok">'+t('msg.dataDirOk')+'</span>'
                    :'<span class="pill err">'+esc(t('msg.dataDirErr', r.data_dir_msg))+'</span>';
    $('connStatus').innerHTML=h;
    connInfo={ok:r.ollama_ok, mode:r.run_mode};
    renderConnBadge();
    if(r.ollama_ok)refreshStatus();
  }catch(e){$('connStatus').innerHTML='<span class="pill err">'+esc(e.message)+'</span>';}
}

function renderTable(el,data){
  if(!data.ok){el.innerHTML='<div class="empty">'+esc(t('status.fetchFail', data.raw||''))+'</div>';return;}
  if(!data.rows||!data.rows.length){el.innerHTML='<div class="empty">'+t('status.none')+'</div>';return;}
  const cols=Object.keys(data.rows[0]);
  let h='<table><thead><tr>'+cols.map(c=>'<th>'+esc(c)+'</th>').join('')+'</tr></thead><tbody>';
  h+=data.rows.map(r=>'<tr>'+cols.map(c=>'<td>'+esc(r[c])+'</td>').join('')+'</tr>').join('');
  h+='</tbody></table>';el.innerHTML=h;
}
async function refreshStatus(){
  try{renderTable($('psTable'),await jget('/api/ps'));}catch(e){$('psTable').innerHTML='<div class="empty">'+esc(e.message)+'</div>';}
  try{renderTable($('listTable'),await jget('/api/installed'));}catch(e){$('listTable').innerHTML='<div class="empty">'+esc(e.message)+'</div>';}
}

// ---------------- Download staging ----------------
async function refreshStaging(){
  try{
    const r=await jget('/api/downloads');
    $('stagingTotal').textContent=r.count
      ? t('staging.total', r.total_human, r.count)
      : t('staging.empty');
    if(!r.entries.length){ $('stagingTable').innerHTML=''; return; }
    let h='<table><thead><tr><th>'+t('staging.col.name')+'</th><th style="text-align:right">'+t('staging.col.size')+'</th></tr></thead><tbody>';
    h+=r.entries.map(e=>'<tr><td><code style="font-family:ui-monospace,monospace;font-size:12px">'+esc(e.name)+'</code></td><td style="text-align:right">'+esc(e.size_human)+'</td></tr>').join('');
    h+='</tbody></table>';
    $('stagingTable').innerHTML=h;
  }catch(e){
    $('stagingTable').innerHTML='';
    $('stagingTotal').textContent=t('staging.loadFail', e.message);
  }
}
async function clearStaging(){
  let dir='';
  try{ dir=(await jget('/api/downloads')).dir||''; }catch(e){}
  if(!confirm(t('staging.confirm', dir))) return;
  $('stagingStatus').innerHTML='<span class="spin"></span> '+t('staging.clearing');
  $('clearStagingBtn').disabled=true;
  try{
    const r=await jpost('/api/downloads/clear',{});
    if(r.failed && r.failed.length){
      $('stagingStatus').innerHTML='<span class="pill err">'+esc(t('staging.partial', r.freed_human, r.failed.length))+'</span>';
    }else{
      $('stagingStatus').innerHTML='<span class="pill ok">'+esc(t('staging.cleared', r.freed_human))+'</span>';
    }
  }catch(e){
    $('stagingStatus').innerHTML='<span class="pill err">'+esc(e.message)+'</span>';
  }finally{
    $('clearStagingBtn').disabled=false;
    refreshStaging();
  }
}

let currentFiles=[];
async function listFiles(){
  const repo=$('repo_id').value.trim();
  if(!repo){$('filesStatus').innerHTML='<span class="pill err">'+t('msg.fillRepoId')+'</span>';return;}
  $('filesStatus').innerHTML='<span class="spin"></span> '+t('msg.readingFiles');
  try{
    const r=await jget('/api/hf/files?repo_id='+encodeURIComponent(repo)+'&revision='+encodeURIComponent($('revision').value.trim()||'main'));
    currentFiles=r.files;
    renderFiles();
    $('filesWrap').style.display='block';
    $('filesStatus').innerHTML='<span class="pill ok">'+t('msg.filesCount', r.files.length)+'</span>';
    // auto-suggest format + name
    const hasGguf=r.files.some(f=>f.is_gguf);
    $('fmt').value=hasGguf?'gguf':'safetensors';
    if(!$('model_name').value)$('model_name').value=repo.split('/').pop().toLowerCase().replace(/-gguf$/i,'');
    selectByType(hasGguf?'gguf':'safetensors');
  }catch(e){$('filesStatus').innerHTML='<span class="pill err">'+esc(e.message)+'</span>';}
}
function renderFiles(){
  $('fileList').innerHTML=currentFiles.map((f,i)=>{
    let tag='';if(f.is_gguf)tag='<span class="tag">GGUF</span>';else if(f.is_safetensors)tag='<span class="tag">safetensors</span>';
    return '<div class="filerow"><input type="checkbox" data-i="'+i+'" id="f'+i+'">'+
      '<code>'+esc(f.path)+'</code>'+tag+
      '<span class="sz">'+(f.size?human(f.size):'')+'</span></div>';
  }).join('');
}
function selectByType(ty){
  currentFiles.forEach((f,i)=>{
    const cb=$('f'+i);if(!cb)return;
    if(ty==='none')cb.checked=false;
    else if(ty==='gguf')cb.checked=f.is_gguf;
    else if(ty==='safetensors')cb.checked=!f.is_gguf; // everything except gguf (weights + configs)
  });
}
function selectedFiles(){return currentFiles.filter((f,i)=>$('f'+i)&&$('f'+i).checked).map(f=>f.path);}

async function startImport(){
  const files=selectedFiles();
  if(!files.length){$('importStatus').innerHTML='<span class="pill err">'+t('msg.selectOne')+'</span>';return;}
  if(!$('model_name').value.trim()){$('importStatus').innerHTML='<span class="pill err">'+t('msg.fillModelName')+'</span>';return;}
  try{
    const r=await jpost('/api/import',{
      repo_id:$('repo_id').value.trim(),
      files:files,
      fmt:$('fmt').value,
      model_name:$('model_name').value.trim(),
      revision:$('revision').value.trim()||'main',
      extra_modelfile:$('extra_modelfile').value,
    });
    $('importStatus').innerHTML='<span class="pill ok">'+t('msg.jobStarted')+'</span>';
    $('jobsCard').style.display='block';
    pollJobs();
  }catch(e){$('importStatus').innerHTML='<span class="pill err">'+esc(e.message)+'</span>';}
}

let jobsTimer=null;
async function pollJobs(){
  if(jobsTimer)clearInterval(jobsTimer);
  const tick=async()=>{
    try{
      const r=await jget('/api/jobs');
      if(!r.jobs.length){return;}
      lastJobs=r.jobs;
      $('jobsCard').style.display='block';
      renderJobs();
      const active=r.jobs.some(j=>j.status==='running'||j.status==='queued');
      if(active)refreshStatusThrottled();
      if(!active&&jobsTimer){clearInterval(jobsTimer);jobsTimer=null;refreshStatus();refreshStaging();}
    }catch(e){}
  };
  await tick();
  jobsTimer=setInterval(tick,1200);
}
function renderJobs(){
  if(!lastJobs.length)return;
  $('jobsWrap').innerHTML=lastJobs.map(renderJob).join('');
}
function renderJob(j){
  const badge=j.status==='running'?'<span class="spin"></span> '+t('job.running'):
    j.status==='done'?'<span class="pill ok">'+t('job.done')+'</span>':
    j.status==='error'?'<span class="pill err">'+t('job.error')+'</span>':'<span class="pill">'+t('job.queued')+'</span>';
  let h='<div style="border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:12px">';
  h+='<div class="row"><strong>'+esc(j.title)+'</strong>'+badge+'</div>';
  h+='<div class="statusline muted">'+esc(j.stage||'')+(j.progress_label?' · '+esc(j.progress_label):'')+'</div>';
  if(j.status==='running'){h+='<div class="progress"><div style="width:'+(j.progress||0)+'%"></div></div>';}
  if(j.error)h+='<div class="statusline"><span class="pill err">'+esc(j.error)+'</span></div>';
  h+='<pre class="log">'+esc(j.log||'')+'</pre>';
  h+='</div>';return h;
}

let lastStatus=0;
function refreshStatusThrottled(){const t=Date.now();if(t-lastStatus>4000){lastStatus=t;refreshStatus();}}

// ==================== init ====================
$('lang').value=curLang;
applyI18n();
loadSettings().then(testConnection);
refreshStaging();
jget('/api/jobs').then(r=>{if(r.jobs&&r.jobs.length){lastJobs=r.jobs;$('jobsCard').style.display='block';pollJobs();}});
</script>
</body>
